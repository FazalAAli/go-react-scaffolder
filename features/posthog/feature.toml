name = "posthog"
always = false
description = "PostHog analytics (React + Go)"

post_steps = ["cd frontend && bun add posthog-js @posthog/react"]

[[regions]]
target = "frontend/app/providers.tsx"
region = "providers-imports"
content = 'import { PostHogProvider } from "~/integrations/posthog";'

[[regions]]
target = "frontend/app/providers.tsx"
region = "providers"
content = "PostHogProvider,"

[[regions]]
target = "frontend/.env"
region = "env"
content = """
VITE_POSTHOG_KEY=
VITE_POSTHOG_HOST=https://us.i.posthog.com"""

[[regions]]
target = "backend/.env"
region = "env"
content = """
POSTHOG_API_KEY=
POSTHOG_HOST=https://us.i.posthog.com"""

[[regions]]
target = "backend/internal/config/config.go"
region = "config-fields"
content = """
PostHogAPIKey string
PostHogHost   string"""

[[regions]]
target = "backend/internal/config/config.go"
region = "config-load"
content = """
PostHogAPIKey: os.Getenv("POSTHOG_API_KEY"),
PostHogHost:   os.Getenv("POSTHOG_HOST"),"""

[[regions]]
target = "backend/internal/app/app.go"
region = "app-imports"
content = '"backend/internal/posthog"'

[[regions]]
target = "backend/internal/app/app.go"
region = "app-fields"
content = "PostHog *posthog.Client"

[[regions]]
target = "backend/internal/app/app.go"
region = "app-init"
content = """
ph, err := posthog.New(cfg)
if err != nil {
	return nil, err
}
a.PostHog = ph"""

[[regions]]
target = "README.md"
region = "readme-components"
content = "- PostHog analytics wired into the React app and Go backend (`posthog` feature)."
